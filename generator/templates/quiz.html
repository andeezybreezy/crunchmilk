<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}}</title>
<meta name="description" content="{{metaDescription}}">
<link rel="canonical" href="https://{{domain}}/{{slug}}/">
<meta property="og:title" content="{{title}}">
<meta property="og:description" content="{{metaDescription}}">
<meta property="og:type" content="website">
<meta property="og:url" content="https://{{domain}}/{{slug}}/">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{title}}">
<meta name="twitter:description" content="{{metaDescription}}">
<meta name="robots" content="index, follow">
<meta property="og:image" content="https://crunchmilk.com/og-image.png">
<meta name="twitter:image" content="https://crunchmilk.com/og-image.png">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;800&family=DM+Sans:wght@400;500;600;700&display=swap" as="style">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4448238469960841"
     crossorigin="anonymous"></script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Quiz",
  "name": "{{quizName}}",
  "description": "{{metaDescription}}",
  "url": "https://{{domain}}/{{slug}}/"
}
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --coral:#E63946;
  --coral-dark:#C1121F;
  --primary:{{primaryColor}};
  --primary-dark:{{primaryDarkColor}};
  --navy:#1D3557;
  --navy-light:#264773;
  --cream:#F5F0EB;
  --cream-dark:#E8E0D8;
  --card:#FFFFFF;
  --text:#1C1917;
  --text-mid:#57534E;
  --text-light:#A8A29E;
  --border:#D6D3D1;
  --radius:8px;
  --shadow:0 1px 3px rgba(28,25,23,0.06),0 4px 12px rgba(28,25,23,0.04);
  --font-display:'Bricolage Grotesque',Georgia,serif;
  --font-body:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
}
body{font-family:var(--font-body);background:var(--cream);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
.container{max-width:680px;margin:0 auto;padding:0 24px}

/* Noise */
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:0.025;z-index:9999;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* Site Nav */
.site-nav{background:var(--navy);padding:0;position:sticky;top:0;z-index:100}
.nav-inner{display:flex;align-items:center;justify-content:space-between;max-width:680px;margin:0 auto;padding:14px 24px}
.logo{display:flex;align-items:center;text-decoration:none;gap:10px}
.logo-mark{width:30px;height:30px;background:var(--coral);border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:13px;color:#fff;font-weight:800;letter-spacing:-0.5px;transform:rotate(-2deg)}
.logo-text{font-family:var(--font-display);font-size:1.1rem;font-weight:800;color:#fff;letter-spacing:-0.5px}
.logo-text span{color:var(--coral)}

/* Breadcrumb Bar */
.breadcrumb-bar{background:var(--navy);padding:10px 0}
.breadcrumb{font-family:var(--font-body);font-size:0.75rem;color:rgba(255,255,255,0.5);letter-spacing:0.3px}
.breadcrumb a{color:rgba(255,255,255,0.5);text-decoration:none;transition:color 0.15s}
.breadcrumb a:hover{color:#fff;text-decoration:underline}
.breadcrumb .sep{opacity:0.5;margin:0 6px}
.breadcrumb .current{opacity:0.8}

/* Page Header */
.page-header{background:var(--navy);color:#fff;padding:12px 0 36px}
.page-header .container{position:relative}
.page-header h1{font-family:var(--font-display);font-size:1.8rem;font-weight:800;letter-spacing:-0.5px;line-height:1.2;margin-bottom:8px}
.page-header p{font-size:0.92rem;opacity:0.6;font-weight:400;max-width:520px;line-height:1.5}
.page-header::after{content:'';display:block;width:40px;height:3px;background:var(--coral);margin-top:20px;border-radius:2px}

main{padding:28px 0 48px}

/* Quiz Card */
.quiz-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:32px 28px;margin-bottom:20px;border:1px solid rgba(0,0,0,0.04);position:relative;overflow:hidden}
.quiz-card::before{content:'';position:absolute;top:0;left:28px;right:28px;height:1px;background:linear-gradient(90deg,transparent,var(--primary),transparent)}

/* Progress Bar */
.progress-wrap{margin-bottom:28px}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.progress-label{font-size:0.78rem;font-weight:600;color:var(--text-mid);text-transform:uppercase;letter-spacing:0.5px}
.progress-count{font-size:0.78rem;font-weight:600;color:var(--primary);font-family:var(--font-display)}
.progress-track{width:100%;height:6px;background:var(--cream-dark);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-dark));border-radius:3px;transition:width 0.4s cubic-bezier(0.22,1,0.36,1);width:0%}

/* Question */
.question-container{position:relative;min-height:280px}
.question-slide{position:absolute;top:0;left:0;right:0;opacity:0;transform:translateX(40px);transition:all 0.4s cubic-bezier(0.22,1,0.36,1);pointer-events:none}
.question-slide.active{opacity:1;transform:translateX(0);pointer-events:auto;position:relative}
.question-slide.exit-left{opacity:0;transform:translateX(-40px)}

.question-number{font-size:0.72rem;font-weight:600;color:var(--primary);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.question-text{font-family:var(--font-display);font-size:1.2rem;font-weight:700;letter-spacing:-0.3px;line-height:1.4;margin-bottom:24px;color:var(--text)}

/* Options */
.options-list{display:flex;flex-direction:column;gap:10px}
.option-btn{display:flex;align-items:center;gap:14px;width:100%;padding:14px 18px;background:var(--cream);border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;text-align:left;font-size:0.92rem;font-weight:500;font-family:var(--font-body);color:var(--text);transition:all 0.2s ease;position:relative;overflow:hidden}
.option-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--primary);transform:scaleY(0);transition:transform 0.2s ease;transform-origin:bottom}
.option-btn:hover{border-color:var(--primary);background:var(--card);transform:translateX(4px)}
.option-btn:hover::before{transform:scaleY(1)}
.option-btn.selected{border-color:var(--primary);background:var(--card);box-shadow:0 0 0 3px rgba(var(--primary-rgb,37,99,235),0.1)}
.option-btn.selected::before{transform:scaleY(1)}
.option-letter{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:var(--card);border:1.5px solid var(--border);border-radius:50%;font-family:var(--font-display);font-size:0.78rem;font-weight:700;color:var(--text-mid);flex-shrink:0;transition:all 0.2s ease}
.option-btn:hover .option-letter,.option-btn.selected .option-letter{background:var(--primary);border-color:var(--primary);color:#fff}
.option-label{flex:1;line-height:1.4}

/* Start Screen */
.quiz-start{text-align:center;padding:20px 0}
.quiz-start-icon{width:64px;height:64px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;transform:rotate(-3deg)}
.quiz-start-icon svg{width:32px;height:32px;color:#fff}
.quiz-start h2{font-family:var(--font-display);font-size:1.4rem;font-weight:800;letter-spacing:-0.5px;margin-bottom:8px}
.quiz-start p{font-size:0.92rem;color:var(--text-mid);max-width:380px;margin:0 auto 24px;line-height:1.6}
.quiz-start-meta{display:flex;justify-content:center;gap:32px;margin-bottom:28px;padding:16px 0;border-top:1px solid var(--cream-dark);border-bottom:1px solid var(--cream-dark)}
.quiz-start-meta-item{text-align:center}
.quiz-start-meta-val{font-family:var(--font-display);font-size:1.1rem;font-weight:800;color:var(--primary)}
.quiz-start-meta-label{font-size:0.72rem;color:var(--text-light);text-transform:uppercase;letter-spacing:0.5px;font-weight:600;margin-top:2px}
.start-btn{display:inline-flex;align-items:center;gap:8px;padding:14px 36px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:var(--font-body);letter-spacing:0.2px}
.start-btn:hover{background:var(--primary-dark);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.15)}
.start-btn:active{transform:scale(0.98)}
.start-btn svg{width:18px;height:18px}

/* Result Screen */
.quiz-result{display:none;text-align:center;padding:20px 0}
.quiz-result.visible{display:block;animation:resultFadeIn 0.6s ease}
@keyframes resultFadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* Score Gauge */
.score-gauge{position:relative;width:180px;height:180px;margin:0 auto 24px}
.score-gauge svg{width:180px;height:180px;transform:rotate(-90deg)}
.score-gauge .gauge-bg{fill:none;stroke:var(--cream-dark);stroke-width:10}
.score-gauge .gauge-fill{fill:none;stroke:var(--primary);stroke-width:10;stroke-linecap:round;stroke-dasharray:440;stroke-dashoffset:440;transition:stroke-dashoffset 1.2s cubic-bezier(0.22,1,0.36,1)}
.score-gauge .gauge-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.score-number{font-family:var(--font-display);font-size:2.8rem;font-weight:800;color:var(--primary);letter-spacing:-2px;line-height:1}
.score-of{font-size:0.72rem;color:var(--text-light);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-top:2px}

.result-label-badge{display:inline-block;padding:6px 20px;background:var(--primary);color:#fff;border-radius:20px;font-family:var(--font-display);font-size:0.88rem;font-weight:700;letter-spacing:0.3px;margin-bottom:16px}
.result-analysis{font-size:0.95rem;color:var(--text-mid);max-width:440px;margin:0 auto 28px;line-height:1.7}

/* CTA */
.result-cta{background:var(--cream);border:1.5px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:24px}
.result-cta p{font-size:0.88rem;color:var(--text-mid);margin-bottom:14px;line-height:1.5}
.cta-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);font-size:0.95rem;font-weight:700;cursor:pointer;text-decoration:none;transition:all 0.2s;font-family:var(--font-body)}
.cta-btn:hover{background:var(--primary-dark);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.15)}
.cta-btn svg{width:18px;height:18px}

/* Share */
.share-section{padding-top:20px;border-top:1px solid var(--cream-dark)}
.share-title{font-family:var(--font-display);font-size:0.92rem;font-weight:700;color:var(--text);margin-bottom:12px}
.share-buttons{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.share-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:none;border-radius:6px;font-size:0.78rem;font-weight:600;cursor:pointer;text-decoration:none;color:#fff;transition:opacity 0.2s;font-family:var(--font-body)}
.share-btn:hover{opacity:0.85}
.share-btn-x{background:#000}
.share-btn-fb{background:#1877f2}
.share-btn-reddit{background:#ff4500}
.share-btn-copy{background:var(--text-mid);color:#fff}

/* Retake */
.retake-btn{display:inline-block;margin-top:20px;padding:10px 24px;background:transparent;border:1.5px solid var(--border);border-radius:var(--radius);font-size:0.85rem;font-weight:600;color:var(--text-mid);cursor:pointer;font-family:var(--font-body);transition:all 0.15s}
.retake-btn:hover{border-color:var(--primary);color:var(--primary)}

/* Footer */
footer{background:var(--navy);padding:36px 0;text-align:center;font-size:0.78rem;color:rgba(255,255,255,0.4)}
footer a{color:rgba(255,255,255,0.4);text-decoration:none;transition:color 0.2s}
footer a:hover{color:#fff}
.footer-inner{display:flex;flex-direction:column;align-items:center;gap:8px}
.footer-brand{font-family:var(--font-display);font-weight:800;color:rgba(255,255,255,0.7);font-size:1rem;letter-spacing:-0.5px}
.footer-links{display:flex;gap:20px}
.footer-links a{font-size:0.78rem}
.footer-rule{width:40px;height:2px;background:var(--coral);opacity:0.4;border:none;margin:4px 0}

/* Mobile */
@media(max-width:480px){
  .page-header h1{font-size:1.4rem}
  .quiz-card{padding:24px 18px}
  .question-text{font-size:1.05rem}
  .option-btn{padding:12px 14px;font-size:0.85rem}
  .score-gauge{width:150px;height:150px}
  .score-gauge svg{width:150px;height:150px}
  .score-number{font-size:2.2rem}
  .quiz-start-meta{gap:20px}
  .share-buttons{justify-content:center}
}
</style>
</head>
<body>

<nav class="site-nav">
  <div class="nav-inner">
    <a href="/" class="logo">
      <div class="logo-mark">CM</div>
      <div class="logo-text">Crunch<span>Milk</span></div>
    </a>
  </div>
</nav>

<div class="breadcrumb-bar">
  <div class="container">
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a href="/">Home</a><span class="sep">&rsaquo;</span><a href="/quizzes/">Quizzes</a><span class="sep">&rsaquo;</span><span class="current">{{quizName}}</span>
    </nav>
  </div>
</div>

<header class="page-header">
  <div class="container">
    <h1>{{quizName}}</h1>
    <p>{{tagline}}</p>
  </div>
</header>

<main>
<div class="container">

  <div class="quiz-card">
    {{quizHTML}}
  </div>

</div>
</main>

<footer>
  <div class="container footer-inner">
    <span class="footer-brand">CrunchMilk</span>
    <hr class="footer-rule">
    <p>&copy; {{year}} CrunchMilk &middot; {{quizName}}</p>
    <div class="footer-links">
      <a href="/about/">About</a>
      <a href="/contact/">Contact</a>
      <a href="/privacy/">Privacy</a>
      <a href="/terms/">Terms</a>
      <a href="/sitemap/">Sitemap</a>
    </div>
  </div>
</footer>

<script>
{{quizJS}}
</script>

</body>
</html>
